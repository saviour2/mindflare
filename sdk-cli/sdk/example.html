<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindflare Chat Integration Demo</title>
    <style>
        body { margin: 0; padding: 40px; font-family: sans-serif; background: #0a0a0a; color: white; display: flex; flex-direction: column; align-items: center; }
        #chat-widget { width: 400px; height: 600px; margin-top: 20px; }
        .code { background: #1a1a1a; padding: 20px; border-radius: 8px; font-family: monospace; border: 1px border #333; }
    </style>
</head>
<body>
    <h1>Mindflare AI Integration</h1>
    <p>This chatbot is integrated with just 2 lines of SDK code.</p>

    <div class="code">
        const mf = new Mindflare({ appId: "...", apiKey: "..." });<br>
        mf.mountChat("#chat-widget");
    </div>

    <!-- Container for the widget -->
    <div id="chat-widget"></div>

    <!-- In a real app, you'd import from @mindflare/sdk -->
    <script type="module">
        // Mocking the SDK behavior for demo
        class Mindflare {
            constructor({ appId, apiKey, baseUrl = "http://localhost:3000" }) {
                this.appId = appId;
                this.apiKey = apiKey;
                this.baseUrl = baseUrl;
            }
            mountChat(selector) {
                const el = document.querySelector(selector);
                const iframe = document.createElement('iframe');
                iframe.src = `${this.baseUrl}/widget/${this.appId}?secret=${this.apiKey}`;
                iframe.style.width = "100%";
                iframe.style.height = "100%";
                iframe.style.border = "none";
                iframe.style.borderRadius = "16px";
                iframe.style.boxShadow = "0 10px 50px rgba(0,0,0,0.5)";
                el.appendChild(iframe);
            }
        }

        // 1. Initialize
        const mf = new Mindflare({ 
            appId: "YOUR_APP_ID", 
            apiKey: "YOUR_CLIENT_SECRET" 
        });

        // 2. Mount
        mf.mountChat("#chat-widget");
    </script>
</body>
</html>
